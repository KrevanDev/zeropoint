<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroPoint // Start</title>
    <style>
        :root {
            --timer-color: linear-gradient(to right, #39ff14, #a3ff00);
            --glow-color: rgba(57, 255, 20, 0.5);
            --accent-color: #39ff14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: #050a05;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
            transition: background 0.8s ease;
            position: relative;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
            pointer-events: none;
        }

        body:has(.wl-active) #mainCard {
            animation: borderGlow 2s infinite ease-in-out;
        }

        .container {
            width: 100%;
            max-width: 650px;
            position: relative;
            z-index: 2;
            padding: 20px;
            transition: opacity 0.4s ease;
        }

        .glass-card {
            background: rgba(57, 255, 20, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 80px 40px 40px 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes borderGlow {
            0% { border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
            50% { border-color: var(--accent-color); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), 0 0 15px var(--glow-color); }
            100% { border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        }

        .weather-widget {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .weather-widget:hover { background: rgba(255, 255, 255, 0.1); }
        .loc-text { font-weight: 600; color: #fff; margin-right: 4px; }

        .time-wrapper { 
            cursor: pointer; 
            user-select: none; 
            margin-bottom: 35px;
        }
        #greeting { font-size: 1.2rem; font-weight: 400; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255, 255, 255, 0.6); }
        
        #clock { 
            font-size: 5rem; 
            font-weight: 700; 
            background: linear-gradient(to right, #fff, #a5a5a5); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-variant-numeric: tabular-nums; 
        }
        
        .timer-mode #clock { 
            background: var(--timer-color) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            filter: drop-shadow(0 0 10px var(--glow-color));
        }
        
        .timer-controls { display: flex; justify-content: center; gap: 15px; height: 0; overflow: hidden; opacity: 0; transition: all 0.3s ease; }
        .timer-mode .timer-controls { height: 45px; opacity: 1; margin-bottom: 25px; }
        .btn-timer { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }

        .popout-menu { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .menu-toggle-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .menu-toggle-btn svg { width: 20px; height: 20px; stroke: rgba(255, 255, 255, 0.5); fill: none; stroke-width: 2; }
        .menu-content { background: rgba(15, 15, 25, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; display: flex; flex-direction: column; padding: 8px; gap: 4px; position: absolute; top: 0; right: -150px; width: 140px; opacity: 0; visibility: hidden; transition: 0.3s; }
        .popout-menu.active .menu-content { opacity: 1; visibility: visible; transform: translateX(0); }
        .menu-item-btn { background: none; border: none; color: rgba(255, 255, 255, 0.6); display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; width: 100%; text-align: left; transition: 0.2s; }
        .menu-item-btn:hover, .menu-item-btn.active { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .menu-item-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

        #wakeLockBtn.wl-active .eye-closed-svg { display: none; }
        #wakeLockBtn.wl-active .eye-open-svg { display: block; }
        #wakeLockBtn:not(.wl-active) .eye-open-svg { display: none; }
        #wakeLockBtn.wl-active svg { stroke: #00ff7f; filter: drop-shadow(0 0 5px rgba(0, 255, 127, 0.5)); }

        .view-content { width: 100%; transition: opacity 0.3s; }
        .hidden { display: none; opacity: 0; }

        .search-bar { position: relative; width: 100%; }
        .search-bar input { width: 100%; padding: 16px 25px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.05); color: #ffffff; font-size: 1rem; outline: none; text-align: center; margin-bottom: 35px; }

        .command-floating-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--accent-color);
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 12px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .command-floating-hint.visible { opacity: 1; }

        .links-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        /* Draggable Styles */
        .link-item { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 12px 16px; 
            border-radius: 12px; 
            color: rgba(255, 255, 255, 0.8); 
            text-decoration: none; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            transition: transform 0.2s, background 0.2s, border-color 0.2s, opacity 0.2s; 
            cursor: grab;
            user-select: none;
        }
        .link-item:active { cursor: grabbing; }
        .link-item:hover { transform: translateY(-2px); background: rgba(255,255,255,0.08); color: #fff; border-color: var(--accent-color); }
        .link-item.dragging { opacity: 0.4; transform: scale(0.95); }
        .link-item.drag-over { border: 2px dashed var(--accent-color); background: rgba(255, 255, 255, 0.1); }
        
        .link-favicon { width: 18px; height: 18px; border-radius: 4px; pointer-events: none; }
        .link-item span { pointer-events: none; }

        .todo-header { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-align: left; }
        .todo-input-row { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .todo-input-row input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; outline: none; }
        .btn-todo-add { background: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: 600; cursor: pointer; color: #000; }
        .todo-list-scroll { max-height: 400px; overflow-y: auto; text-align: left; }
        .todo-item-box { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .todo-main-line { display: flex; align-items: center; justify-content: space-between; }
        .todo-text-display { cursor: pointer; flex: 1; }
        .todo-text-display.done { text-decoration: line-through; opacity: 0.4; }
        .subtask-area { margin-top: 10px; padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.1); }
        .sub-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.9rem; }
        .sub-done { text-decoration: line-through; opacity: 0.4; }
        .sub-input-box { width: 100%; font-size: 0.8rem; padding: 6px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; margin-top: 5px; outline: none; }
        .del-btn { color: #ff4d4d; cursor: pointer; background: none; border: none; font-size: 1.1rem; padding-left: 10px; }

        .menu-item-btn svg {
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .menu-item-btn:hover svg {
            transform: rotate(25deg); /* Subtle spin on hover for the gear */
        }

        /* Disable interaction when settings or backdrop is active */
        .container.dimmed {
            pointer-events: none;
            user-select: none;
            filter: blur(4px) brightness(0.7);
            transition: filter 0.4s ease;
        }

        .settings-modal { 
            position: fixed; 
            top: 0; 
            right: 0; 
            width: 400px; 
            height: 100vh; 
            background: rgba(10, 10, 15, 0.98); 
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 60px 40px; 
            text-align: left; 
            z-index: 2000;
            box-shadow: -15px 0 50px rgba(0,0,0,0.6);
            overflow-y: auto;
            transform: translateX(100%);
            visibility: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s; 
        }
        
        .settings-modal.active { 
            transform: translateX(0);
            visibility: visible;
        }
        
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; font-size: 0.75rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .setting-group input, .setting-group select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: #1a1a24; 
            color: #ffffff; 
            outline: none;
            appearance: none; 
        }

        .setting-group select option { background: #1a1a24; color: #ffffff; }
        
        .shortcut-list-container { background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; max-height: 150px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .shortcut-edit-item { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; font-size: 0.9rem; }
        #saveSettingsBtn { width: 100%; padding: 14px; margin-top: 20px; border-radius: 10px; border: none; background: var(--timer-color); color: #fff; font-weight: 700; cursor: pointer; }
        
        .modal-backdrop { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); opacity: 0; visibility: hidden; 
            transition: 0.3s; z-index: 1999; 
        }
        .modal-backdrop.active { opacity: 1; visibility: visible; }

        /* Zen Mode Class */
        body.zen-active .container {
            opacity: 0;
            pointer-events: none;
        }

        /* Iridescent Theme Animations */
        html.theme-iridescent body {
            background: linear-gradient(45deg, #12001e, #001e1e, #1e1e00, #12001e) !important;
            background-size: 400% 400% !important;
            animation: iridescentBg 15s ease infinite !important;
        }
        @keyframes iridescentBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <div class="vignette"></div>
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <div class="container">
        <div class="glass-card" id="mainCard">
            
            <div class="weather-widget" id="weatherWidget" onclick="toggleWeatherUnit()">
                <span id="weatherLoc" class="loc-text">Locating...</span>
                <span id="weatherTemp">--</span>
            </div>

            <div class="popout-menu" id="popoutMenu">
                <button id="menuToggle" class="menu-toggle-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <div class="menu-content">
                    <button id="navDashboardBtn" class="menu-item-btn active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span>Dashboard</span></button>
                    <button id="navTodoBtn" class="menu-item-btn"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg><span>Tasks</span></button>
                    <button id="wakeLockBtn" class="menu-item-btn">
                        <svg class="eye-closed-svg" viewBox="0 0 24 24"><path d="M2 10s4 5 10 5 10-5 10-5"></path><line x1="4" y1="11" x2="3" y2="14"></line><line x1="9" y1="14" x2="8" y2="17"></line><line x1="15" y1="14" x2="16" y2="17"></line><line x1="20" y1="11" x2="21" y2="14"></line></svg>
                        <svg class="eye-open-svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <span>Wake Lock</span>
                    </button>
                    <button id="settingsBtn" class="menu-item-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Settings</span>
                    </button>
                </div>
            </div>

            <div id="dashboardView" class="view-content">
                <div class="time-wrapper" id="timeWrapper">
                    <div id="greeting">Hello</div>
                    <div id="clock">00:00</div>
                </div>
                <div class="timer-controls">
                    <button class="btn-timer" id="timerStartBtn">Start</button>
                    <button class="btn-timer" id="timerResetBtn">Reset</button>
                </div>
                <div class="search-bar">
                    <form id="searchForm">
                        <input type="text" id="searchInput" placeholder="Type to search..." autofocus autocomplete="off">
                    </form>
                    <div id="commandHint" class="command-floating-hint"></div>
                </div>
                <div class="links-grid" id="linksGrid"></div>
            </div>

            <div id="todoView" class="view-content hidden">
                <div class="todo-header">Tasks</div>
                <form id="todoForm" class="todo-input-row">
                    <input type="text" id="todoInputMain" placeholder="Add task..." autocomplete="off">
                    <button type="submit" class="btn-todo-add" id="todoAddBtn">Add</button>
                </form>
                <div class="todo-list-scroll" id="todoDisplayArea"></div>
            </div>

        </div>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px; align-items:center;">
            <h2 style="letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem;">Preferences</h2>
            <button id="closeSettingsBtn" style="background:none; border:none; color:#fff; font-size:2rem; cursor:pointer; line-height:1;">&times;</button>
        </div>
        <div class="setting-group"><label>Profile Name</label><input type="text" id="userNameInput"></div>
        <div class="setting-group"><label>Time Format</label><select id="timeFormatSelect"><option value="12">12-Hour</option><option value="24">24-Hour</option></select></div>
        
        <div class="setting-group">
            <label>Interface Theme</label>
            <select id="themeSelect">
                <option value="toxic">Toxic Neon</option>
                <option value="blaze">Blaze Orange</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="lofi">Lofi Chill</option>
                <option value="vaporwave">Vaporwave</option>
                <option value="monochrome">Monochrome</option>
                <option value="iridescent">Iridescent Shift</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Background Effect</label>
            <select id="bgEffectSelect">
                <option value="classic">Classic Web</option>
                <option value="magnetic">Magnetic Gravity</option>
                <option value="matrix">Digital Rain</option>
                <option value="geometric">Geometric Drift</option>
                <option value="crystals">Crystal Shards</option>
                <option value="bubbles">Drifting Bubbles</option>
            </select>
        </div>

        <div class="setting-group"><label>Shortcuts</label><div class="shortcut-list-container" id="shortcutEditorList"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="newLabel" placeholder="Label"><input type="text" id="newUrl" placeholder="URL"><button id="addShortcutBtn" style="padding:0 15px; border-radius:10px; border:none; background:#fff; color:#000; font-weight:bold;">+</button></div>
        </div>
        <button id="saveSettingsBtn">Save & Close</button>
    </div>

    <script>
        let appSettings = { 
            userName: 'User', 
            timeFormat: '24', 
            theme: 'toxic', 
            bgEffect: 'classic',
            weatherUnit: 'C', 
            shortcuts: [
                { label: 'GitHub', url: 'https://github.com' }, 
                { label: 'YouTube', url: 'https://youtube.com' }
            ] 
        };
        let todoData = [];
        let isTimerMode = false, timerSecs = 25 * 60, timerInterval = null, isRunning = false;
        let lastWeatherData = null;
        let lastFocusedSubtaskId = null;
        let wakeLock = null;
        let lastSetTimerMinutes = 25; // Track the last duration used
        const themesList = ['toxic', 'blaze', 'cyberpunk', 'lofi', 'vaporwave', 'monochrome', 'iridescent'];

        // --- BACKGROUND CANVAS SYSTEM ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let matrixDrops = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', () => { initCanvas(); });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.baseSize = this.size;
                this.density = (Math.random() * 30) + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.angle = Math.random() * 360;
                this.spin = Math.random() < 0.5 ? 1 : -1;
                this.points = Math.floor(Math.random() * 3) + 5;
                this.rotation = Math.random() * Math.PI * 2;
                this.bubbleSpeed = Math.random() * 1 + 0.5;
            }
            draw() {
                const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#ffffff';
                ctx.fillStyle = accent;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                
                const effect = appSettings.bgEffect;
                if (effect === 'crystals') {
                    // Draw crystal polygons
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.moveTo(this.size * 3, 0);
                    for (let i = 1; i < this.points; i++) {
                        ctx.lineTo(this.size * 3 * Math.cos(i * 2 * Math.PI / this.points), this.size * 3 * Math.sin(i * 2 * Math.PI / this.points));
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.globalAlpha = 0.1;
                    ctx.fill();
                    ctx.restore();
                } else if (effect === 'bubbles') {
                    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 0.05;
                    ctx.fill();
                } else {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            update(effect) {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (effect === 'magnetic' && distance < mouse.radius * 2) {
                    let force = (mouse.radius * 2 - distance) / (mouse.radius * 2);
                    this.x += (dx / distance) * force * 2;
                    this.y += (dy / distance) * force * 2;
                    this.size = this.baseSize + (force * 3);
                } else if (effect === 'classic' && distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x += (dx / distance) * force * this.density * 0.4;
                    this.y += (dy / distance) * force * this.density * 0.4;
                } else if (effect === 'geometric') {
                    this.angle += 0.01 * this.spin;
                    this.x += Math.cos(this.angle) * 0.2;
                    this.y += Math.sin(this.angle) * 0.2;
                } else if (effect === 'crystals') {
                    this.rotation += 0.01 * this.spin;
                    this.x += this.speedX * 0.5;
                    this.y += this.speedY * 0.5;
                } else if (effect === 'bubbles') {
                    this.y -= this.bubbleSpeed;
                    this.x += Math.sin(this.y / 50) * 0.5;
                    if (this.y < -20) this.y = canvas.height + 20;
                }

                if (effect !== 'bubbles') {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                    if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
                }
                
                this.draw();
            }
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const count = (canvas.width * canvas.height) / 10000;
            for (let i = 0; i < count; i++) particles.push(new Particle());

            const columns = Math.floor(canvas.width / 20);
            matrixDrops = Array(columns).fill(1);
        }

        function animateBg() {
            const effect = appSettings.bgEffect;
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#ffffff';
            
            if (effect === 'matrix') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = getComputedStyle(document.body).backgroundColor;
                ctx.globalAlpha = 1;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (effect === 'matrix') {
                ctx.fillStyle = accent;
                ctx.font = "15px monospace";
                matrixDrops.forEach((y, i) => {
                    const text = String.fromCharCode(Math.random() * 128);
                    const x = i * 20;
                    ctx.fillText(text, x, y * 20);
                    let dist = Math.abs(x - mouse.x);
                    let speed = (dist < 100) ? 0.5 : 0.25;
                    if (y * 20 > canvas.height && Math.random() > 0.975) matrixDrops[i] = 0;
                    matrixDrops[i] += speed;
                });
            } else {
                ctx.strokeStyle = accent;
                for (let a = 0; a < particles.length; a++) {
                    if (effect === 'classic' || effect === 'geometric') {
                        for (let b = a; b < particles.length; b++) {
                            let dx = particles[a].x - particles[b].x;
                            let dy = particles[a].y - particles[b].y;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            let limit = effect === 'classic' ? 150 : 80;
                            if (dist < limit) {
                                ctx.globalAlpha = (1 - (dist / limit)) * 0.15;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(particles[a].x, particles[a].y);
                                ctx.lineTo(particles[b].x, particles[b].y);
                                ctx.stroke();
                            }
                        }
                    }
                    particles[a].update(effect);
                }
            }
            requestAnimationFrame(animateBg);
        }

                'cyberpunk': { bg: '#0d0221', card: 'rgba(252, 238, 10, 0.02)', timer: 'linear-gradient(to right, #00ff9f, #00b8ff)', glow: 'rgba(252, 238, 10, 0.4)', accent: '#fcee0a' },
                'lofi': { bg: '#2b213a', card: 'rgba(244, 162, 97, 0.03)', timer: 'linear-gradient(to right, #e76f51, #f4a261)', glow: 'rgba(244, 162, 97, 0.3)', accent: '#f4a261' },

        // --- WEATHER ---
        async function getWeatherData() {
            const locEl = document.getElementById('weatherLoc');
            const tempEl = document.getElementById('weatherTemp');

            const handleError = (msg) => {
                locEl.textContent = msg;
                tempEl.textContent = "--";
            };

            if (!navigator.geolocation) {
                handleError("Not Supported");
                return;
            }

            // Set a timeout for geolocation in case the browser hangs
            const geoOptions = { timeout: 10000 }; 

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                locEl.textContent = "Updating...";

                try {
                    // Fetch Weather
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const weatherData = await weatherRes.json();
                    
                    // Fetch City Name
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
                    const geoData = await geoRes.json();
                    
                    const city = geoData.address.city || geoData.address.town || geoData.address.village || "Nearby";
                    
                    lastWeatherData = { 
                        tempC: weatherData.current_weather.temperature, 
                        code: weatherData.current_weather.weathercode, 
                        city: city 
                    };
                    
                    locEl.textContent = city;
                    displayWeather();
                } catch (e) {
                    handleError("API Error");
                    console.error("Weather Fetch Failed:", e);
                }
            }, (error) => {
                // Specific error handling for Geolocation
                if (error.code === 1) handleError("Loc. Denied");
                else if (error.code === 2) handleError("Loc. Unavailable");
                else handleError("Loc. Timeout");
            }, geoOptions);
        }

        function displayWeather() {
            if (!lastWeatherData) return;
            const tempEl = document.getElementById('weatherTemp');
            const { tempC, code } = lastWeatherData;
            let displayTemp = appSettings.weatherUnit === 'F' ? Math.round((tempC * 9/5) + 32) : Math.round(tempC);
            let icon = code <= 3 ? (code === 0 ? '☀️' : '☁️') : '🌧️';
            tempEl.textContent = `${icon} ${displayTemp}°${appSettings.weatherUnit}`;
        }

        window.toggleWeatherUnit = () => {
            appSettings.weatherUnit = appSettings.weatherUnit === 'C' ? 'F' : 'C';
            localStorage.setItem('startpageSettings', JSON.stringify(appSettings));
            displayWeather();
        };

        // --- CLOCK & TIMER ---
        function updateClock() {
            const clockEl = document.getElementById('clock');
            const greetEl = document.getElementById('greeting');
            
            if (!isTimerMode) {
                const now = new Date();
                let h = now.getHours();
                const m = String(now.getMinutes()).padStart(2, '0');
                if (appSettings.timeFormat === '12') {
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    h = h % 12 || 12;
                    clockEl.textContent = `${h}:${m} ${ampm}`;
                } else { 
                    clockEl.textContent = `${String(h).padStart(2, '0')}:${m}`; 
                }
                greetEl.textContent = `ZeroPoint // ${appSettings.userName}`;
            } else {
                const m = String(Math.floor(timerSecs / 60)).padStart(2, '0');
                const s = String(timerSecs % 60).padStart(2, '0');
                clockEl.textContent = `${m}:${s}`;
                greetEl.textContent = "ZeroPoint // Focus";
            }
        }

        function updateTimerDuration() {
            if (!isRunning) { 
                timerSecs = lastSetTimerMinutes * 60; 
                updateClock(); 
            }
        }

            isTimerMode = !isTimerMode;

        document.getElementById('timerStartBtn').onclick = function() {
            if (Notification.permission === "default") { Notification.requestPermission(); }
            if (isRunning) { clearInterval(timerInterval); this.textContent = "Start"; isRunning = false; }
            else {
                isRunning = true;
                this.textContent = "Pause";
                timerInterval = setInterval(() => {
                    if (timerSecs > 0) { timerSecs--; updateClock(); }
                    else { clearInterval(timerInterval); new Notification("Complete!", {body: "Take a break."}); resetTimer(); }
                }, 1000);
            }
        };

        document.getElementById('timerResetBtn').onclick = resetTimer;

        function resetTimer() { 
            clearInterval(timerInterval); 
            isRunning = false; 
            document.getElementById('timerStartBtn').textContent = "Start";

        // --- DRAGGABLE SHORTCUTS SYSTEM ---
        let dragSrcIndex = null;

        function renderLinks() {
            const grid = document.getElementById('linksGrid'); 
            grid.innerHTML = '';
            
            appSettings.shortcuts.forEach((s, i) => {
                const a = document.createElement('a');
                a.href = s.url;
                a.className = 'link-item';
                a.draggable = true;
                a.dataset.index = i;
                
                try {
                    const domain = new URL(s.url).hostname;
                    a.innerHTML = `<img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="link-favicon"><span>${s.label}</span>`;
                } catch(e) { 
                    a.innerHTML = `<span>${s.label}</span>`; 
                }

                // Drag Events
                a.addEventListener('dragstart', handleDragStart);
                a.addEventListener('dragover', handleDragOver);
                a.addEventListener('dragleave', handleDragLeave);
                a.addEventListener('drop', handleDrop);
                a.addEventListener('dragend', handleDragEnd);

                grid.appendChild(a);
            });
        }

        function handleDragStart(e) {
            dragSrcIndex = this.dataset.index;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            // Set dummy data for Firefox compatibility
            e.dataTransfer.setData('text/plain', dragSrcIndex);
        }

        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            this.classList.add('drag-over');
            return false;
        }

        function handleDragLeave() {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.stopPropagation();
            e.preventDefault();
            
            const targetIndex = this.dataset.index;
            
            if (dragSrcIndex !== targetIndex) {
                // Reorder array
                const movedItem = appSettings.shortcuts.splice(dragSrcIndex, 1)[0];
                appSettings.shortcuts.splice(targetIndex, 0, movedItem);
                
                // Save and refresh
                localStorage.setItem('startpageSettings', JSON.stringify(appSettings));
                renderLinks();
            }
            return false;
        }

        function handleDragEnd() {
            const items = document.querySelectorAll('.link-item');
            items.forEach(item => {
                item.classList.remove('dragging');
                item.classList.remove('drag-over');
            });
        }

                    const matches = commands.filter(c => c.startsWith(cmd));
                    if (matches.length === 1) match = matches[0] + " ";
                } else if (cmd === '/theme') {
                    const matches = themes.filter(t => t.startsWith(arg));

            if (!wakeLock) {
                try { 
                    wakeLock = await navigator.wakeLock.request('screen'); 
                    btn.classList.add('wl-active');
                    wakeLock.addEventListener('release', () => { if(wakeLock) btn.classList.remove('wl-active'); });
                } catch (e) {}
            } else { wakeLock.release(); wakeLock = null; btn.classList.remove('wl-active'); }
        };

        initCanvas();
        animateBg();
        loadSettings();
        setInterval(() => { if (!isTimerMode) updateClock(); }, 1000);
        updateClock();
    </script>
</body>
</html>

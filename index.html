<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroPoint // Start</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <script>
      const path = window.location.pathname;
      const base =
        path.endsWith('/')
          ? path
          : path.replace(/\/[^/]*$/, '/');
    
      window.APP_BASE = base; // optional, for debugging
    
      const s = document.createElement('script');
      s.type = 'module';
      s.src = base + 'script.js';
      document.head.appendChild(s);
    </script>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <div class="vignette"></div>
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <div class="container">
        <div class="glass-card" id="mainCard">
            
            <div class="weather-widget" id="weatherWidget" onclick="toggleWeatherUnit()">
                <span id="weatherLoc" class="loc-text">Locating...</span>
                <span id="weatherTemp">--</span>
            </div>

            <div class="popout-menu" id="popoutMenu">
                <button id="menuToggle" class="menu-toggle-btn">
                    <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="menu-content">
                    <button id="navDashboardBtn" class="menu-item-btn active">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        <span>Dashboard</span>
                    </button>
                    <button id="navTodoBtn" class="menu-item-btn">
                        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                        <span>Tasks</span>
                    </button>
                    <button id="wakeLockBtn" class="menu-item-btn">
                        <svg class="eye-closed-svg" viewBox="0 0 24 24"><path d="M2 10s4 5 10 5 10-5 10-5"></path><line x1="4" y1="11" x2="3" y2="14"></line><line x1="9" y1="14" x2="8" y2="17"></line><line x1="15" y1="14" x2="16" y2="17"></line><line x1="20" y1="11" x2="21" y2="14"></line></svg>
                        <svg class="eye-open-svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <span>Wake Lock</span>
                    </button>
                    <button id="settingsBtn" class="menu-item-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Settings</span>
                    </button>
                </div>
            </div>

            <div id="dashboardView" class="view-content">
                <div class="time-wrapper" id="timeWrapper">
                    <div id="greeting">Hello</div>
                    <div id="clock">00:00</div>
                </div>
                <div class="timer-controls">
                    <button class="btn-timer" id="timerStartBtn">Start</button>
                    <button class="btn-timer" id="timerResetBtn">Reset</button>
                </div>
                <div class="search-bar">
                    <form id="searchForm">
                        <input type="text" id="searchInput" placeholder="Type to search..." autofocus autocomplete="off">
                    </form>
                    <div id="commandHint" class="command-floating-hint"></div>
                </div>
                <div class="links-grid" id="linksGrid"></div>
            </div>

            <div id="todoView" class="view-content hidden">
                <div class="todo-header">Tasks</div>
                <form id="todoForm" class="todo-input-row">
                    <input type="text" id="todoInputMain" placeholder="Add task..." autocomplete="off">
                    <button type="submit" class="btn-todo-add" id="todoAddBtn">Add</button>
                </form>
                <div class="todo-list-scroll" id="todoDisplayArea"></div>
            </div>

        </div>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-header">
            <h2 class="settings-title">Preferences</h2>
            <button id="closeSettingsBtn" class="close-btn">&times;</button>
        </div>
        <div class="setting-group"><label>Profile Name</label><input type="text" id="userNameInput"></div>
        <div class="setting-group"><label>Time Format</label><select id="timeFormatSelect"><option value="12">12-Hour</option><option value="24">24-Hour</option></select></div>
        
        <div class="setting-group">
            <label>Interface Theme</label>
            <select id="themeSelect">
                <option value="toxic">Toxic</option>
                <option value="blaze">Blaze</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="lofi">Lofi</option>
                <option value="vaporwave">Vaporwave</option>
                <option value="sakura">Sakura</option>
                <option value="forest">Forest</option>
                <option value="nebula">Nebula</option>
                <option value="glacier">Glacier</option>
                <option value="midnight">Midnight</option>
                <option value="amber">Amber</option>
                <option value="iridescent">Iridescent (Heavy Usage)</option>
            </select>
            <!-- <div id="themePreviewContainer" class="theme-preview-grid"></div> -->
        </div>

        <div class="setting-group">
            <label>Background Effect</label>
            <select id="bgEffectSelect">
                <option value="classic">Classic</option>
                <option value="magnetic">Magnetic</option>
                <option value="matrix">Matrix</option>
                <option value="geometric">Geometric</option>
                <option value="crystals">Crystals</option>
                <option value="bubbles">Bubbles</option>
                <option value="stellar">Stellar</option>
                <option value="petals">Petals</option>
                <option value="leaves">Leaves</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Shortcuts</label>
            <div class="shortcut-list-container" id="shortcutEditorList"></div>
            <div class="shortcut-adder">
                <input type="text" id="newLabel" placeholder="Label">
                <input type="text" id="newUrl" placeholder="URL">
                <button id="addShortcutBtn" class="add-btn">+</button>
            </div>
        </div>
        <button id="saveSettingsBtn">Save & Close</button>
    </div>

    <div id="terminalDrawer" class="terminal-drawer">
        <div class="terminal-header">
            <span>ZeroPoint // System Terminal v1.0.4a</span>
            <span class="terminal-status">READY</span>
        </div>
    <div id="terminalOutput" class="terminal-output">
        </div>
        <div class="terminal-input-line">
            <span class="prompt">></span>
            <input type="text" id="terminalInput" spellcheck="false" autocomplete="off">
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
